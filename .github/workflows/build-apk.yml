name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Download and setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BesTas-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Show error log on failure
        if: failure()
        run: |
          echo "=== KOTLIN COMPILE ERRORS ==="
          find . -name "*.log" -path "*/build/*" -exec grep -l "error:" {} \; | head -5 | xargs cat 2>/dev/null | grep "e:" | head -30
          echo "=== GRADLE ERROR OUTPUT ==="
          find . -name "*.log" -path "*/build/*" | head -3 | xargs tail -50 2>/dev/null
